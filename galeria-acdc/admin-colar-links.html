<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atualizar Galeria ACDC</title>
  <style>
    body { margin:0; font-family:Arial, sans-serif; background:#fff; color:#111; }
    main { max-width:980px; margin:0 auto; padding:42px 20px; }
    h1 { margin:0 0 10px; font-size:34px; text-transform:uppercase; letter-spacing:-.02em; }
    p { color:#555; line-height:1.55; }
    textarea { width:100%; min-height:260px; padding:16px; border:1px solid #ccc; border-radius:10px; font:14px/1.5 monospace; resize:vertical; }
    .bar { display:flex; flex-wrap:wrap; gap:10px; margin:16px 0 24px; }
    button, a.button { border:1px solid #111; background:#111; color:#fff; border-radius:999px; padding:11px 18px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; cursor:pointer; text-decoration:none; }
    button.secondary, a.secondary { background:#fff; color:#111; }
    .hint { background:#f7f7f7; border:1px solid #e4e4e4; border-radius:12px; padding:14px 16px; margin:16px 0; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:20px; }
    .grid img { width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:6px; background:#eee; }
    @media (max-width:760px) { .grid { grid-template-columns:repeat(2,1fr); } h1 { font-size:28px; } }
  </style>
</head>
<body>
<main>
  <h1>Atualizar galeria</h1>
  <p>Cole os links das fotos abaixo, um por linha. Se quiser, coloque uma descrição depois do link usando barra vertical.</p>
  <div class="hint">
    Exemplo:<br>
    <code>https://site.com/foto.jpg | Cozinha planejada</code>
  </div>

  <textarea id="links" placeholder="Cole aqui os links das fotos..."></textarea>

  <div class="bar">
    <button type="button" id="preview">Pré-visualizar</button>
    <button type="button" id="copy" class="secondary">Copiar lista pronta</button>
    <a class="button secondary" href="https://github.com/escalopicitas-code/Widgets-ACDC-/edit/main/galeria-acdc/fotos.txt" target="_blank" rel="noopener">Abrir fotos.txt no GitHub</a>
  </div>

  <p id="status"></p>
  <div id="grid" class="grid"></div>
</main>

<script>
(function(){
  var textarea = document.getElementById('links');
  var grid = document.getElementById('grid');
  var status = document.getElementById('status');

  function lines() {
    return textarea.value.split('\n').map(function(line){ return line.trim(); }).filter(Boolean);
  }

  function preview() {
    grid.textContent = '';
    var list = lines();
    list.forEach(function(line){
      var url = line.split('|')[0].trim();
      if (!/^https?:\/\//i.test(url)) return;
      var img = document.createElement('img');
      img.src = url;
      img.alt = '';
      grid.appendChild(img);
    });
    status.textContent = list.length ? list.length + ' link(s) na lista.' : 'Cole pelo menos um link de foto.';
  }

  document.getElementById('preview').addEventListener('click', preview);
  document.getElementById('copy').addEventListener('click', function(){
    var content = '# Galeria ACDC Casa\n# Cole um link de foto por linha. Opcional: link | descrição\n\n' + lines().join('\n') + '\n';
    navigator.clipboard.writeText(content).then(function(){
      status.textContent = 'Lista copiada. Agora abra o fotos.txt no GitHub, cole e salve em Commit changes.';
    }, function(){
      status.textContent = 'Não consegui copiar automaticamente. Selecione o texto e copie manualmente.';
    });
  });
})();
</script>
</body>
</html>
