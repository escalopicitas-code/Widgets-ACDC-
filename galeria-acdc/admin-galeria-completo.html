<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atualizar Galeria ACDC</title>
  <style>
    :root{--ink:#111;--muted:#666;--line:#ddd;--soft:#f7f7f7;--ok:#0b7a34;--err:#b00020}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#fff;color:var(--ink)}
    main{max-width:920px;margin:0 auto;padding:34px 18px 60px}
    h1{margin:0 0 8px;font-size:clamp(28px,4vw,44px);line-height:1.05;text-transform:uppercase;letter-spacing:-.03em}
    p{color:var(--muted);line-height:1.55}
    label{display:block;margin:18px 0 7px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
    textarea,input{width:100%;border:1px solid var(--line);border-radius:12px;padding:14px;font:15px/1.45 Arial,sans-serif;background:#fff;color:#111}
    textarea{min-height:320px;resize:vertical;font-family:Consolas,monospace}
    .card{border:1px solid var(--line);border-radius:18px;padding:18px;margin:18px 0;background:#fff}
    .hint{background:var(--soft);border:1px solid #e5e5e5;border-radius:14px;padding:14px;color:#444;margin:16px 0}
    .token-box{display:none;margin-top:10px}
    .bar{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0}
    button,a.btn{border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:999px;padding:12px 18px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
    button.secondary,a.secondary{background:#fff;color:var(--ink)}
    .status{min-height:24px;margin:12px 0;font-weight:700}.ok{color:var(--ok)}.err{color:var(--err)}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}.photo{position:relative;border-radius:8px;overflow:hidden;background:#eee;aspect-ratio:1/1}.photo img{width:100%;height:100%;object-fit:cover;display:block}.photo span{position:absolute;left:6px;bottom:6px;background:rgba(0,0,0,.65);color:#fff;border-radius:999px;padding:4px 8px;font-size:11px}
    code{background:#eee;padding:2px 5px;border-radius:5px}.small{font-size:12px;color:#777}
    @media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<main>
  <h1>Atualizar galeria</h1>
  <p>Cole os links das fotos abaixo e clique em <strong>Salvar galeria</strong>. A mudança é feita automaticamente no GitHub.</p>

  <div class="hint">
    <strong>Formato:</strong><br>
    <code>https://site.com/foto.jpg</code><br>
    ou <code>https://site.com/foto.jpg | Descrição da foto</code>
  </div>

  <div class="card">
    <label for="links">Links das fotos</label>
    <textarea id="links" placeholder="Cole aqui os links das fotos, um por linha"></textarea>

    <div class="bar">
      <button type="button" id="carregar" class="secondary">Carregar fotos atuais</button>
      <button type="button" id="organizar" class="secondary">Organizar links</button>
      <button type="button" id="preview" class="secondary">Pré-visualizar</button>
      <button type="button" id="salvar">Salvar galeria</button>
    </div>

    <p id="status" class="status"></p>
    <div id="grid" class="grid"></div>
  </div>

  <button type="button" id="config" class="secondary">Configuração / Token</button>
  <div id="tokenBox" class="token-box card">
    <label for="token">Token do GitHub</label>
    <input id="token" type="password" autocomplete="off" placeholder="Cole aqui seu token do GitHub">
    <label style="text-transform:none;letter-spacing:0;font-size:13px;font-weight:400"><input id="lembrar" type="checkbox" style="width:auto"> Lembrar token neste navegador</label>
    <p class="small">O token é necessário para salvar no GitHub. Ele não fica no código da galeria.</p>
  </div>
</main>

<script>
(function(){
  const REPO='escalopicitas-code/Widgets-ACDC-';
  const PATH='galeria-acdc/fotos.txt';
  const BRANCH='main';
  const MESSAGE='Atualiza fotos da galeria ACDC';
  const $=id=>document.getElementById(id);
  const tokenEl=$('token'),linksEl=$('links'),statusEl=$('status'),gridEl=$('grid'),lembrarEl=$('lembrar');
  const saved=localStorage.getItem('acdc_github_token')||''; if(saved){tokenEl.value=saved; lembrarEl.checked=true;}
  function status(msg,type){statusEl.textContent=msg||'';statusEl.className='status '+(type||'')}
  function headers(){return {'Accept':'application/vnd.github+json','Authorization':'Bearer '+tokenEl.value.trim(),'X-GitHub-Api-Version':'2022-11-28'}}
  function apiRead(){return 'https://api.github.com/repos/'+REPO+'/contents/'+PATH+'?ref='+BRANCH}
  function apiWrite(){return 'https://api.github.com/repos/'+REPO+'/contents/'+PATH}
  function b64(s){return btoa(unescape(encodeURIComponent(s)))}
  function fromB64(s){return decodeURIComponent(escape(atob(s.replace(/\n/g,''))))}
  function extract(text){
    const out=[];
    text.split(/\n+/).map(l=>l.trim()).filter(Boolean).forEach(line=>{
      if(line.includes('|')){const first=line.split('|')[0].trim(); if(/^https?:\/\//i.test(first))out.push(line); return;}
      const urls=line.match(/https?:\/\/[^\s"'<>]+/gi); if(urls)urls.forEach(u=>out.push(u.replace(/[),.;]+$/,'')));
    });
    return Array.from(new Set(out));
  }
  function content(){return '# Galeria ACDC Casa\n# Cole um link de foto por linha. Opcional: link | descrição\n\n'+extract(linksEl.value).join('\n')+'\n'}
  function preview(){
    const list=extract(linksEl.value); gridEl.textContent='';
    list.forEach((line,i)=>{const url=line.split('|')[0].trim(); const d=document.createElement('div'); d.className='photo'; d.innerHTML='<img src="'+url.replace(/"/g,'&quot;')+'" alt=""><span>'+(i+1)+'</span>'; gridEl.appendChild(d);});
    status(list.length?list.length+' foto(s) pronta(s).':'Cole pelo menos um link. ',list.length?'ok':'err');
  }
  async function requireToken(){if(!tokenEl.value.trim()){document.getElementById('tokenBox').style.display='block';throw new Error('Cole o token do GitHub em Configuração / Token.')}}
  async function carregar(){await requireToken(); status('Carregando fotos atuais...',''); const r=await fetch(apiRead(),{headers:headers()}); if(!r.ok)throw new Error('Erro ao carregar: '+r.status); const data=await r.json(); linksEl.value=fromB64(data.content).replace(/^#.*$/gm,'').trim(); status('Fotos atuais carregadas.','ok'); preview();}
  async function salvar(){
    await requireToken(); const list=extract(linksEl.value); if(!list.length)throw new Error('Cole pelo menos um link antes de salvar.');
    if(lembrarEl.checked)localStorage.setItem('acdc_github_token',tokenEl.value.trim()); else localStorage.removeItem('acdc_github_token');
    status('Salvando galeria...',''); const get=await fetch(apiRead(),{headers:headers()}); if(!get.ok)throw new Error('Não consegui ler o arquivo atual: '+get.status); const file=await get.json();
    const put=await fetch(apiWrite(),{method:'PUT',headers:Object.assign({'Content-Type':'application/json'},headers()),body:JSON.stringify({message:MESSAGE,content:b64(content()),sha:file.sha,branch:BRANCH})});
    const ans=await put.json(); if(!put.ok)throw new Error(ans.message||'Erro ao salvar.'); status('Galeria salva com sucesso. O site atualiza em instantes.','ok'); preview();
  }
  $('config').onclick=()=>{const b=$('tokenBox'); b.style.display=b.style.display==='block'?'none':'block'};
  $('organizar').onclick=()=>{linksEl.value=extract(linksEl.value).join('\n'); preview();};
  $('preview').onclick=preview;
  $('carregar').onclick=()=>carregar().catch(e=>status(e.message,'err'));
  $('salvar').onclick=()=>salvar().catch(e=>status(e.message,'err'));
})();
</script>
</body>
</html>
